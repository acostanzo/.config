# Source plugins
set -g @plugin 'tmux-plugins/tpm' # Plugin manager
set -g @plugin 'acostanzo/tmux-catppuccin'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'acostanzo/tmux-huckleberry'
set -g @plugin 'tmux-plugins/tmux-copycat'
set -g @plugin 'tmux-plugins/tmux-open'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'

# Huckleberry extensions palette — tmux-resurrect
set -g @huckleberry-extensions 'resurrect'
set -g @huckleberry-extension-resurrect-label 'Resurrect'
set -g @huckleberry-extension-resurrect-actions 'save,restore'
set -g @huckleberry-extension-resurrect-save-label 'Save Session'
set -g @huckleberry-extension-resurrect-save-cmd 'run-shell ~/.config/tmux/plugins/tmux-resurrect/scripts/save.sh'
set -g @huckleberry-extension-resurrect-restore-label 'Restore Session'
set -g @huckleberry-extension-resurrect-restore-cmd 'run-shell ~/.config/tmux/plugins/tmux-resurrect/scripts/restore.sh'

set-environment -g PATH "$HOME/.local/share/mise/shims:$PATH"

set -g base-index 1 # start window numbers at 1 to match keyboard order
set -g default-command $SHELL
set -g default-shell $SHELL
set -g escape-time 0 # zero-out escape time delay (default 500ms)
set -g mouse on # allow mouse control of panes
set -g prefix C-b # Set prefix to Ctrl+a instead of Ctrl+b
set -g prefix2 C-a
set -g renumber-windows on # Renumbers windows on close
set -g status-position top # Window position of tmux modules
setw -g mode-keys vi # vi mode navigation

# Create windows relative to current path
bind-key '"' split-window -c "#{pane_current_path}"
bind-key 'v' split-window -h -c "#{pane_current_path}"
bind-key c new-window -c "#{pane_current_path}"
bind-key f display-popup -h 75% -w 80% -d "#{pane_current_path}"
bind C-a send-prefix -2 # Support ctrl-a along with ctrl-b for prefix

# Prefix h/l keys to switch windows
bind-key h previous-window
bind-key l next-window

# Resource config with keybinding
bind-key R source-file ~/.config/tmux/tmux.conf \; display-message "~/.config/tmux/tmux.conf reloaded"

# Catppuccin customizations
set -g @catppuccin_flavor "frappe"
set -g @catppuccin_window_current_text " #W#{?window_zoomed_flag,(),} "
set -g @catppuccin_window_status_style "rounded"
set -g @catppuccin_window_text " #W#{?window_zoomed_flag,(),} "
set -g @catppuccin_window_text_color "#{@thm_surface_1}"
set -g @catppuccin_window_current_text_color "#{@thm_surface_1}"

# Full pill separators for status modules
set -g @catppuccin_status_left_separator " "
set -g @catppuccin_status_right_separator ""
set -g @catppuccin_status_connect_separator "no"
set -g @catppuccin_status_background "#303446"
set -g @catppuccin_status_module_text_bg "#{@thm_surface_1}"

run '~/.config/tmux/plugins/tmux-catppuccin/catppuccin.tmux'

set -g status-left ""
set -g status-right-length 100
set -g status-right ""
set -ag status-right "#{E:@catppuccin_status_session}"
set -ag status-right "#{E:@catppuccin_status_application}"
set -ag status-right "#{E:@catppuccin_status_directory}"

# Run plugins
run '~/.config/tmux/plugins/tpm/tpm'

# Override catppuccin's popup colors (must be after TPM since catppuccin sets these)
set -g popup-style 'bg=#303446'
set -g popup-border-style 'fg=#74c7ec'
